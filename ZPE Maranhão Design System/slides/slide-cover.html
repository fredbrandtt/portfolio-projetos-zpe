<!-- @dsCard group="Slides" viewport="1280x720" name="Slide · Capa" subtitle="Abyss + grão + seta — apresentação institucional" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  .slide { width: 1280px; height: 720px; position: relative; overflow: hidden; background: var(--grad-abyss); color: #fff; font-family: var(--font-body); display: flex; flex-direction: column; justify-content: center; padding: 96px; box-sizing: border-box; }
  .slide::after { content: ""; position: absolute; inset: 0; background: var(--grain-dark) repeat; mix-blend-mode: overlay; pointer-events: none; }
  .arrow { position: absolute; right: -60px; top: 50%; transform: translateY(-50%); width: 440px; opacity: .9; z-index: 1; }
  .world { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; opacity: .12; filter: brightness(0) invert(1); z-index: 1; }
  .inner { position: relative; z-index: 3; max-width: 60%; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: var(--green-soft); border: 1px solid rgba(76,172,75,.35); padding: 7px 16px; border-radius: 9999px; }
  h1 { font-family: var(--font-display); font-weight: 300; font-size: 76px; line-height: 1.0; letter-spacing: -.025em; margin: 28px 0 0; max-width: 15ch; }
  h1 b { font-weight: 600; }
  .sub { font-size: 22px; color: rgba(255,255,255,.6); max-width: 40ch; margin-top: 24px; line-height: 1.5; }
  .footer { position: absolute; bottom: 56px; left: 96px; right: 96px; display: flex; justify-content: space-between; align-items: center; z-index: 3; }
  .logo { font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: .02em; }
  .logo span { font-weight: 300; opacity: .7; margin-left: 6px; }
  .pg { font-family: var(--font-mono); font-size: 13px; opacity: .4; }
</style>
</head>
<body>
  <div class="slide">
    <img class="world" src="../assets/brand/world_dotted.svg" alt="">
    <img class="arrow" src="../assets/brand/seta_outline.svg" alt="" style="opacity:.18">
    <div class="inner">
      <span class="badge">Apresentação institucional</span>
      <h1>A <b>ZPE Maranhão</b> como polo industrial estratégico</h1>
      <p class="sub">Conectividade multimodal, incentivos fiscais federais e infraestrutura pronta para operação.</p>
    </div>
    <div class="footer">
      <img src="../assets/brand/logo_fundo_branco.svg" alt="ZPE Maranhão" style="height:34px">
      <span class="pg">01 / 12</span>
    </div>
  </div>
</body>
</html>
