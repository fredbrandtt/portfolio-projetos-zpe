<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--canvas-soft, #f9f9ff); font-family: var(--font-body); padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Card, StatCard } = window.ZPEMaranhODesignSystem_408e04;
    function Demo() {
      return (
        <div className="grid">
          <Card eyebrow="Logística" title="Porto do Itaqui · 800m">
            Um dos portos mais profundos do Brasil, a menos de 1km da ZPE, com calado de 23 metros.
          </Card>
          <StatCard label="Área total" value="300" unit="ha" detail="+40% de expansão prevista" />
          <StatCard tone="green" label="Investimento" value="R$ 4,2" unit="bi" detail="Previsto até 2030" />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
