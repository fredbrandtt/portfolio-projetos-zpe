<!-- @dsCard group="Type" viewport="700x190" name="Stat number" subtitle="Barlow 600, tabular-nums — número de impacto" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--canvas); padding: 24px; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); margin-bottom: 8px; }
  .stats { display: flex; gap: 48px; align-items: baseline; }
  .stat .n { font-family: var(--font-display); font-weight: 600; font-size: 72px; letter-spacing: -.02em; color: var(--blue); font-variant-numeric: tabular-nums; line-height: 1; }
  .stat .u { font-size: .45em; color: var(--green-deep); font-weight: 500; margin-left: 4px; }
  .stat .l { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-mute); margin-top: 8px; }
</style>
</head>
<body>
  <div class="spec">STAT NUMBER · Barlow 600 · clamp(48–80px) · tabular-nums</div>
  <div class="stats">
    <div class="stat"><div class="n">300<span class="u">ha</span></div><div class="l">Área total</div></div>
    <div class="stat"><div class="n">23<span class="u">m</span></div><div class="l">Calado do porto</div></div>
    <div class="stat"><div class="n">40<span class="u">%</span></div><div class="l">Expansão prevista</div></div>
  </div>
</body>
</html>
