<!-- @dsCard group="Brand" viewport="700x300" name="Logo oficial" subtitle="Wordmark sobre claro/escuro + lockup do Governo" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; }
  .pane { min-height: 150px; display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; padding: 24px; }
  .light { background: var(--canvas); }
  .dark { background: var(--grad-abyss); position: relative; overflow: hidden; }
  .dark::after { content:""; position:absolute; inset:0; background: var(--grain-dark) repeat; mix-blend-mode: overlay; }
  .lab { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-mute); }
  .dark .lab { color: rgba(255,255,255,.55); position: relative; z-index: 2; }
  .logo { height: 56px; position: relative; z-index: 2; }
  .gov { grid-column: 1 / -1; background: var(--canvas-soft); border-top: 1px solid var(--line); }
  .gov img { height: 48px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="pane light">
      <img class="logo" src="../assets/brand/logo_fundo_azul.svg" alt="ZPE Maranhão">
      <span class="lab">Sobre claro · wordmark azul</span>
    </div>
    <div class="pane dark">
      <img class="logo" src="../assets/brand/logo_fundo_branco.svg" alt="ZPE Maranhão">
      <span class="lab">Sobre escuro · wordmark branco</span>
    </div>
    <div class="pane gov">
      <img src="../assets/brand/logo_governo.svg" alt="Governo do Maranhão">
      <span class="lab">Co-branding · Governo do Maranhão</span>
    </div>
  </div>
</body>
</html>
