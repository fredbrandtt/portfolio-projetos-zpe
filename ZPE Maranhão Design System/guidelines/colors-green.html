<!-- @dsCard group="Colors" viewport="700x180" name="Verde de ação" subtitle="Acento, nunca dominante — ~10%, cirúrgico" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--canvas); padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .chip { height: 64px; }
  .info { padding: 9px 11px; }
  .name { font-weight: 600; font-size: 12px; color: var(--green-pressed); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#4cac4b"></div><div class="info"><div class="name">Accent</div><div class="hex">#4CAC4B</div></div></div>
    <div class="sw"><div class="chip" style="background:#3d9a3c"></div><div class="info"><div class="name">Deep</div><div class="hex">#3d9a3c</div></div></div>
    <div class="sw"><div class="chip" style="background:#2f7a2e"></div><div class="info"><div class="name">Pressed</div><div class="hex">#2f7a2e</div></div></div>
    <div class="sw"><div class="chip" style="background:#5fb55e"></div><div class="info"><div class="name">Soft</div><div class="hex">#5FB55E</div></div></div>
    <div class="sw"><div class="chip" style="background:#e4f4e3"></div><div class="info"><div class="name">Pale</div><div class="hex">#e4f4e3</div></div></div>
  </div>
</body>
</html>
