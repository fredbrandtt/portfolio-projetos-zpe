<!-- @dsCard group="Colors" viewport="700x180" name="Azul institucional" subtitle="Estrutura, autoridade — ~70% da presença cromática" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--canvas); padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .chip { height: 64px; }
  .info { padding: 9px 11px; }
  .name { font-weight: 600; font-size: 12px; color: var(--blue); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#244582"></div><div class="info"><div class="name">Primary</div><div class="hex">#244582</div></div></div>
    <div class="sw"><div class="chip" style="background:#1a3160"></div><div class="info"><div class="name">Deep</div><div class="hex">#1a3160</div></div></div>
    <div class="sw"><div class="chip" style="background:#0f1d3a"></div><div class="info"><div class="name">Darkest</div><div class="hex">#0f1d3a</div></div></div>
    <div class="sw"><div class="chip" style="background:#142849"></div><div class="info"><div class="name">Pressed</div><div class="hex">#142849</div></div></div>
    <div class="sw"><div class="chip" style="background:#dbe4f5"></div><div class="info"><div class="name">Soft</div><div class="hex">#dbe4f5</div></div></div>
    <div class="sw"><div class="chip" style="background:#eef2fb"></div><div class="info"><div class="name">Pale</div><div class="hex">#eef2fb</div></div></div>
  </div>
</body>
</html>
