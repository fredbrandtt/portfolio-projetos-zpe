<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--canvas); padding: 24px; color: var(--blue); }
  .item { padding: 10px 0; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); letter-spacing: .04em; margin-bottom: 4px; }
  .hero { font-family: var(--font-display); font-weight: 500; font-size: 64px; letter-spacing: -.025em; line-height: .95; }
  .dlg { font-family: var(--font-display); font-weight: 300; font-size: 44px; letter-spacing: -.02em; line-height: .98; }
  .gr { color: var(--green-deep); font-weight: 500; }
</style>
</head>
<body>
  <div class="item">
    <div class="spec">DISPLAY HERO · Barlow 500 · -0.025em</div>
    <div class="hero">R$ 4,2<span class="gr">bi</span></div>
  </div>
  <div class="item">
    <div class="spec">DISPLAY LG · Barlow 300 · -0.02em</div>
    <div class="dlg">Zona de Processamento</div>
  </div>

</html>
