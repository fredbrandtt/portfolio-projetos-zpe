<!-- @dsCard group="Type" viewport="700x240" name="Headlines & título" subtitle="Headline LG/MD e Title em Barlow" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--canvas); padding: 24px; color: var(--blue); }
  .item { padding: 9px 0; border-bottom: 1px solid var(--line); }
  .item:last-child { border-bottom: none; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); margin-bottom: 4px; }
  .h1 { font-family: var(--font-display); font-weight: 300; font-size: 38px; letter-spacing: -.01em; }
  .h2 { font-family: var(--font-display); font-weight: 400; font-size: 28px; }
  .t  { font-family: var(--font-display); font-weight: 600; font-size: 21px; }
  .gr { color: var(--green-deep); font-weight: 500; }
</style>
</head>
<body>
  <div class="item"><div class="spec">HEADLINE LG · Barlow 300 · 48px</div><div class="h1">Infraestrutura de <span class="gr">classe mundial</span></div></div>
  <div class="item"><div class="spec">HEADLINE MD · Barlow 400 · 32px</div><div class="h2">Conectividade multimodal</div></div>
  <div class="item"><div class="spec">TITLE · Barlow 600 · 21px</div><div class="t">Incentivos fiscais federais</div></div>
</body>
</html>
