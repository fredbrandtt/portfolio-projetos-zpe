<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--canvas-soft); padding: 28px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .card { background: #fff; border-radius: 16px; padding: 22px; text-align: center; border: 1px solid var(--line); }
  .l { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .n { font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--blue); }
  .d { font-size: 12px; color: var(--ink-mute); margin-top: 4px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card" style="box-shadow:var(--shadow-sm)"><div class="l">Shadow SM</div><div class="n">Sutil</div><div class="d">Cards em repouso</div></div>
    <div class="card" style="box-shadow:var(--shadow-md)"><div class="l">Shadow MD</div><div class="n">Médio</div><div class="d">Hover de cards</div></div>
    <div class="card" style="box-shadow:var(--shadow-lg)"><div class="l">Shadow LG</div><div class="n">Alto</div><div class="d">Modais, dropdowns</div></div>
  </div>
</body>
</html>
